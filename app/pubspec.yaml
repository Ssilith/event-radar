name: event_radar
description: "Event Radar"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # text
  diacritic: ^0.1.6
  google_fonts: ^8.0.2

  # dates
  intl: ^0.20.2

  # icons
  flutter_material_design_icons: ^3.0.0+7447

  # localization
  geolocator: ^14.0.2

  # settings
  app_settings: ^7.0.0

  # dropdown
  dropdown_search: ^6.0.2

  # navigation bar
  motion_tab_bar_v2: ^0.4.0

  # loading
  flutter_spinkit: ^5.2.2

  # map
  flutter_map: ^8.2.2
  latlong2: ^0.9.1

  # build utilities
  http: ^1.6.0
  json_annotation: ^4.11.0

  # mobile customizations
  flutter_native_splash: ^2.4.7
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  json_serializable: ^6.13.0
  build_runner: ^2.12.2

flutter:
  uses-material-design: true

  assets:
    - assets/
